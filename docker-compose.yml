services:
  # One-shot init container: docker creates named volumes root:root mode
  # 755, but the iii-engine image is distroless and runs as UID 65532
  # with no `chown` of its own. Without this, /data is unwritable, the
  # engine silently buffers in RAM, and state evaporates on every
  # restart — the exact symptom v0.9.7's working-directory fix set out
  # to solve. Runs once at compose-up and exits.
  iii-init:
    image: busybox:1.36
    user: "0:0"
    volumes:
      - iii-data:/data
    entrypoint: ["sh", "-c", "chown -R 65532:65532 /data && chmod 755 /data"]
    restart: "no"

  iii-engine:
    # Pinned to v0.11.2 — the last engine that runs agentmemory's current
    # worker model cleanly. v0.11.6 introduces a new sandbox-everything-
    # via-`iii worker add` model that agentmemory hasn't been refactored
    # for yet; the architectural mismatch surfaces as EPIPE reconnect
    # loops and empty search after save. Bump only after agentmemory is
    # refactored to register as a sandboxed worker.
    #
    # Override per-shell or via .env file:
    #   AGENTMEMORY_III_VERSION=0.11.7 docker compose up
    image: iiidev/iii:${AGENTMEMORY_III_VERSION:-0.11.2}
    user: "65532:65532"
    depends_on:
      iii-init:
        condition: service_completed_successfully
    ports:
      - "3111:3111"
      - "3112:3112"
    volumes:
      - iii-data:/data
      - ./iii-config.docker.yaml:/app/config.yaml:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  agentmemory:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - iii-engine
    ports:
      - "3113:3113"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0

      AGENTMEMORY_VIEWER_PORT: 3113
      AGENTMEMORY_VIEWER_HOST: 0.0.0.0

      III_REST_PORT: 3111
      III_STREAMS_PORT: 3112
      III_ENGINE_URL: ws://iii-engine:49134
      AGENTMEMORY_URL: http://iii-engine:3111

      # Tailscale (cách A): set in .env — openssl rand -hex 32
      AGENTMEMORY_SECRET: ${AGENTMEMORY_SECRET:?Set AGENTMEMORY_SECRET in .env}
      AGENTMEMORY_PUBLIC_URL: http://server-100.tail05b26f.ts.net:3111
      AGENTMEMORY_VIEWER_URL: http://server-100.tail05b26f.ts.net:3113
      VIEWER_ALLOWED_ORIGINS: >-
        http://server-100.tail05b26f.ts.net:3113,
        http://server-100.tail05b26f.ts.net:3111,
        http://localhost:3113,
        http://127.0.0.1:3113,
        http://localhost:3111,
        http://127.0.0.1:3111
      VIEWER_ALLOWED_HOSTS: >-
        server-100.tail05b26f.ts.net:3113,
        server-100.tail05b26f.ts.net:3111

    volumes:
      - agentmemory-data:/app/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  iii-data:
  agentmemory-data:
